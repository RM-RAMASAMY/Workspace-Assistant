apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: voice-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: voice-rag-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: voice-rag-config
            - secretRef:
                name: voice-rag-secrets
          command:
            - sh
            - -c
            - |
              mkdir -p /app/data/chroma_db /app/data/uploads
              # The image ships /app/chroma_db and /app/uploads as real directories.
              # ln -sfn cannot replace a directory, so remove them first or Chroma
              # writes to ephemeral storage while the PVC stays empty (RAG returns nothing).
              rm -rf /app/chroma_db /app/uploads
              ln -sfn /app/data/chroma_db /app/chroma_db
              ln -sfn /app/data/uploads /app/uploads
              ln -sfn /app/data/sql_app.db /app/sql_app.db
              exec python -m uvicorn main:app --host 0.0.0.0 --port 8000
          volumeMounts:
            - name: backend-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: backend-data
