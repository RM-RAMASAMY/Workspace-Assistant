apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-rag-config
  namespace: voice-rag
data:
  # Ollama Desktop on the host machine (not in-cluster).
  # Docker Desktop K8s: host.docker.internal
  # Minikube: change to http://host.minikube.internal:11434
  OLLAMA_BASE_URL: "http://host.docker.internal:11434"
  OLLAMA_MODEL: "gpt-oss:120b-cloud"
  # Use absolute PVC paths so both the server and one-off kubectl exec scripts
  # (seed_data, ingest_samples) read/write the same persistent data store.
  DATABASE_URL: "sqlite+aiosqlite:////app/data/sql_app.db"
  CHROMA_PERSIST_DIRECTORY: "/app/data/chroma_db"
